format_version: '13'
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: react-native

# Default stack for any workflow that doesn't set its own (the shared _prepare
# /_ios/_android utilities). The ios/android workflows override this in their
# own meta block.
meta:
  bitrise.io:
    stack: linux-docker-android-24.04

# ============================================================================
# Pipelines
#   nightly : internal build of both platforms (iOS app.perawallet.ac2-wallet,
#             Android app.perawallet.ac2).
#             iOS -> TestFlight (internal), Android -> Firebase (ac2-alpha).
#             Point a Bitrise scheduled build at this pipeline. When a build is
#             good, promote it to production manually (submit the TestFlight
#             build to the App Store; promote the Play release).
#   release : release build of both platforms. iOS -> TestFlight (same as
#             nightly), Android -> Google Play internal track (AAB). Running
#             both in one pipeline means they share the same
#             $BITRISE_BUILD_NUMBER, so the version name (package.json) and
#             build number / version code are identical across platforms. Run
#             this manually for a release; then submit the TestFlight build in
#             App Store Connect and promote the Play internal track to
#             production once verified.
#
# To get the FIRST Android build onto Play (supply can't create a new app):
# run the standalone `android_play_build` workflow, download the AAB from its
# artifacts, and upload it by hand in the Play Console. After that first manual
# upload the `release` pipeline's automated Play upload works.
# ============================================================================
pipelines:
  nightly:
    stages:
      - build: {}
  release:
    stages:
      - release: {}

stages:
  build:
    workflows:
      - ios: {}
      - android: {}
  release:
    workflows:
      - ios: {}
      - android_play: {}

app:
  envs:
    - APP_ENV: production
    - BUILD_NUMBER: $BITRISE_BUILD_NUMBER
    # Generated by `expo prebuild` from the production app name "AC2".
    - BITRISE_PROJECT_PATH: ios/AC2.xcworkspace
    - BITRISE_SCHEME: AC2
    # Apple Developer team for the App Store account that owns
    # app.perawallet.ac2-wallet. The Fastfile pins manual signing to this team
    # for both targets. Not secret (team IDs ship in every app).
    - IOS_TEAM_ID: KHH37325LN
    - LANG: en_US.UTF-8
    - LC_ALL: en_US.UTF-8

# ============================================================================
# Platform workflows. Each chains the shared prepare workflow, prebuilds, and
# runs the matching Fastlane lane. iOS signing assets are installed by the
# Bitrise "Manage iOS code signing" step before the Fastlane build.
# ============================================================================
workflows:
  ios:
    meta:
      bitrise.io:
        stack: osx-xcode-26.2.x-edge
        machine_type_id: g2.mac.large
    before_run:
      - _prepare
    after_run:
      - _ios

  android:
    meta:
      bitrise.io:
        stack: linux-docker-android-24.04
    before_run:
      - _prepare
    after_run:
      - _android_setup
      - _android_firebase

  # Release build -> Google Play internal track. Shares the Android setup with
  # the nightly Firebase workflow; only the artifact (AAB vs APK) and upload
  # target differ.
  android_play:
    meta:
      bitrise.io:
        stack: linux-docker-android-24.04
    before_run:
      - _prepare
    after_run:
      - _android_setup
      - _android_play

  # Build-only: produces a signed release AAB and publishes it as a build
  # artifact, with NO Play upload. Run this once to get the first AAB for the
  # manual Play Console upload (supply can't bootstrap a new app). Needs no
  # Play service account — only the signing keystore secrets.
  android_play_build:
    meta:
      bitrise.io:
        stack: linux-docker-android-24.04
    before_run:
      - _prepare
    after_run:
      - _android_setup
      - _android_play_build

  # --------------------------------------------------------------------------
  # Shared utility workflows (prefixed with _ so they are not directly run).
  # --------------------------------------------------------------------------
  _prepare:
    steps:
      - git-clone@8:
          inputs:
            - clone_depth: '0'
            - fetch_tags: 'yes'
      - script@1:
          title: Build release notes from git log
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -e
                NOTES=$(git log -10 --pretty=format:'- %s' 2>/dev/null || echo "Build $BUILD_NUMBER")
                envman add --key RELEASE_NOTES --value "$NOTES"
      - restore-cache@3:
          title: Restore node_modules
          inputs:
            - key: node-modules-{{ checksum "pnpm-lock.yaml" }}
      - script@1:
          title: Install Node + JS dependencies (pnpm)
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -ex
                corepack enable
                corepack prepare pnpm@10.12.1 --activate
                pnpm install --frozen-lockfile --prefer-offline
      - save-cache@1:
          title: Save node_modules
          inputs:
            - key: node-modules-{{ checksum "pnpm-lock.yaml" }}
            - paths: |-
                node_modules
                packages/*/node_modules
      - restore-cache@3:
          title: Restore Ruby gems
          inputs:
            - key: bundler-{{ checksum "Gemfile.lock" }}
      - script@1:
          title: Install Ruby gems (fastlane)
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -ex
                # Local path so the gems land in a cacheable dir; persists to
                # the `bundle exec` calls in later steps via .bundle/config.
                bundle config set --local path vendor/bundle
                bundle install
      - save-cache@1:
          title: Save Ruby gems
          inputs:
            - key: bundler-{{ checksum "Gemfile.lock" }}
            - paths: vendor/bundle

  _ios:
    steps:
      - restore-cache@3:
          title: Restore CocoaPods
          inputs:
            - key: |-
                ios-pods-{{ checksum "pnpm-lock.yaml" }}
                ios-pods-
      - script@1:
          title: Expo prebuild (iOS)
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -ex
                pnpm expo prebuild --platform ios --clean
      - save-cache@1:
          title: Save CocoaPods
          inputs:
            - key: ios-pods-{{ checksum "pnpm-lock.yaml" }}
            - paths: ios/Pods
      # Installs the distribution certificate AND every provisioning profile
      # uploaded to this app's "Code Signing & Files" section onto the VM, with
      # no target detection. This is the setup pera-rn uses for the identical
      # app + PasskeyAutofillCredentialProvider layout. We deliberately do NOT
      # use manage-ios-code-signing@2: in api-key mode it ignores the uploaded
      # profiles (creates its own) and can't see the extension target, so it
      # never provisions the autofill extension.
      #
      # PREREQUISITE: the "AC2 Wallet" and "AC2 Wallet Extension" .mobileprovision
      # files must be uploaded to Code Signing & Files (the distribution .p12
      # already is). The Fastfile pins each target to these profiles by name.
      - certificate-and-profile-installer@1:
          title: Install signing cert + provisioning profiles
      - restore-cache@3:
          title: Restore Xcode DerivedData
          inputs:
            - key: |-
                ios-derived-data-{{ checksum "pnpm-lock.yaml" }}
                ios-derived-data-
      - script@1:
          title: Build + upload to TestFlight (fastlane)
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -ex
                # Incremental (clean:false) to reuse the cached DerivedData.
                bundle exec fastlane ios deploy_production clean:false
      - save-cache@1:
          title: Save Xcode DerivedData
          inputs:
            - key: ios-derived-data-{{ checksum "pnpm-lock.yaml" }}
            - paths: ~/Library/Developer/Xcode/DerivedData
      - deploy-to-bitrise-io@2:
          inputs:
            - deploy_path: ./build/ios

  # Shared Android setup: JDK, release keystore, ccache, cache restore, prebuild.
  # Consumed by both _android_firebase (nightly) and _android_play (release).
  # The service-account secret differs per target, so it's decoded in each of
  # those workflows rather than here.
  _android_setup:
    steps:
      - set-java-version@1:
          inputs:
            - set_java_version: '17'
      - script@1:
          title: Decode signing keystore
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -e
                mkdir -p config
                echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > config/release.keystore
                envman add --key ANDROID_KEYSTORE_PATH --value "$BITRISE_SOURCE_DIR/config/release.keystore"
                # Fail fast (seconds, not a 20-min build) with a clear error if
                # the keystore decode / store password / alias are wrong.
                keytool -list -keystore config/release.keystore \
                  -storepass "$ANDROID_KEYSTORE_PASSWORD" -alias "$ANDROID_KEY_ALIAS" >/dev/null \
                  && echo "Keystore OK: alias '$ANDROID_KEY_ALIAS' found"
      - script@1:
          title: Install + configure ccache
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -ex
                sudo apt-get update && sudo apt-get install -y ccache
                ccache --set-config=max_size=2G
                ccache --set-config=compression=true
                # Route the NDK/CMake compilers through ccache so the native
                # C++ deps (webrtc, quick-crypto, mmkv, nitro, reanimated) hit
                # the cache instead of recompiling. envman so it persists to
                # the Gradle step.
                envman add --key NDK_CCACHE --value "$(command -v ccache)"
                envman add --key CMAKE_C_COMPILER_LAUNCHER --value ccache
                envman add --key CMAKE_CXX_COMPILER_LAUNCHER --value ccache
                # Limit parallelism so concurrent Kotlin/KSP/CMake workers don't
                # collectively blow the metaspace cap (OOM). Matches the
                # eas.json testing profile's proven GRADLE_OPTS.
                envman add --key GRADLE_OPTS --value "-Xmx6144m -XX:MaxMetaspaceSize=1g -XX:+UseG1GC -XX:+HeapDumpOnOutOfMemoryError -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false -Dorg.gradle.workers.max=2"
      - restore-cache@3:
          title: Restore ccache
          inputs:
            - key: |-
                android-ccache-{{ checksum "pnpm-lock.yaml" }}
                android-ccache-
      - restore-cache@3:
          title: Restore Gradle caches
          inputs:
            - key: |-
                android-gradle-{{ checksum "pnpm-lock.yaml" }}
                android-gradle-
      - script@1:
          title: Expo prebuild (Android)
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -ex
                pnpm expo prebuild --platform android --clean

  # Nightly path: build the release APK and push it to Firebase App Distribution.
  _android_firebase:
    steps:
      - script@1:
          title: Decode Firebase service account
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -e
                mkdir -p config
                echo "$FIREBASE_SERVICE_ACCOUNT_BASE64" | base64 --decode > config/firebase-service-account.json
      - script@1:
          title: Build APK + upload to Firebase App Distribution
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -ex
                bundle exec fastlane android deploy_production
      - script@1:
          title: ccache stats
          is_always_run: true
          inputs:
            - content: |-
                #!/usr/bin/env bash
                ccache -s || true
      - save-cache@1:
          title: Save Gradle caches
          inputs:
            - key: android-gradle-{{ checksum "pnpm-lock.yaml" }}
            - paths: |-
                ~/.gradle/caches
                ~/.gradle/wrapper
      - save-cache@1:
          title: Save ccache
          inputs:
            - key: android-ccache-{{ checksum "pnpm-lock.yaml" }}
            - paths: ~/.ccache
      - deploy-to-bitrise-io@2:
          inputs:
            - deploy_path: android/app/build/outputs/apk/release

  # Release path: build the release AAB and upload it to the Google Play
  # internal track. The Play Developer API service-account JSON comes from the
  # Bitrise integration (uploaded under Code Signing & Files, exposed as
  # $BITRISEIO_SERVICE_ACCOUNT_JSON_KEY_URL). Falls back to a base64 secret
  # (PLAY_SERVICE_ACCOUNT_JSON_BASE64) if the URL isn't set.
  _android_play:
    steps:
      - script@1:
          title: Fetch Google Play service account
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -e
                mkdir -p config
                if [ -n "$BITRISEIO_SERVICE_ACCOUNT_JSON_KEY_URL" ]; then
                  curl -fsSL "$BITRISEIO_SERVICE_ACCOUNT_JSON_KEY_URL" -o config/play-service-account.json
                elif [ -n "$PLAY_SERVICE_ACCOUNT_JSON_BASE64" ]; then
                  echo "$PLAY_SERVICE_ACCOUNT_JSON_BASE64" | base64 --decode > config/play-service-account.json
                else
                  echo "No Play service account: set the Bitrise service-account file or PLAY_SERVICE_ACCOUNT_JSON_BASE64" >&2
                  exit 1
                fi
      - script@1:
          title: Build AAB + upload to Google Play (internal)
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -ex
                bundle exec fastlane android deploy_play_store
      - script@1:
          title: ccache stats
          is_always_run: true
          inputs:
            - content: |-
                #!/usr/bin/env bash
                ccache -s || true
      - save-cache@1:
          title: Save Gradle caches
          inputs:
            - key: android-gradle-{{ checksum "pnpm-lock.yaml" }}
            - paths: |-
                ~/.gradle/caches
                ~/.gradle/wrapper
      - save-cache@1:
          title: Save ccache
          inputs:
            - key: android-ccache-{{ checksum "pnpm-lock.yaml" }}
            - paths: ~/.ccache
      - deploy-to-bitrise-io@2:
          inputs:
            - deploy_path: android/app/build/outputs/bundle/release

  # Build-only path: build the signed release AAB and publish it as a Bitrise
  # artifact, no Play upload. Used for the first manual Play Console upload.
  _android_play_build:
    steps:
      - script@1:
          title: Build signed release AAB
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -ex
                bundle exec fastlane android build_play_aab
      - script@1:
          title: ccache stats
          is_always_run: true
          inputs:
            - content: |-
                #!/usr/bin/env bash
                ccache -s || true
      - save-cache@1:
          title: Save Gradle caches
          inputs:
            - key: android-gradle-{{ checksum "pnpm-lock.yaml" }}
            - paths: |-
                ~/.gradle/caches
                ~/.gradle/wrapper
      - save-cache@1:
          title: Save ccache
          inputs:
            - key: android-ccache-{{ checksum "pnpm-lock.yaml" }}
            - paths: ~/.ccache
      - deploy-to-bitrise-io@2:
          inputs:
            - deploy_path: android/app/build/outputs/bundle/release
