format_version: "13"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: react-native

# Default stack for any workflow that doesn't set its own (the shared _prepare
# /_ios/_android utilities). The ios/android workflows override this in their
# own meta block.
meta:
  bitrise.io:
    stack: linux-docker-android-22.04

# ============================================================================
# Pipeline
#   nightly : internal build of both platforms (iOS app.perawallet.ac2-wallet,
#             Android app.perawallet.ac2).
#             iOS -> TestFlight (internal), Android -> Firebase (ac2-alpha).
#             Point a Bitrise scheduled build at this pipeline. When a build is
#             good, promote it to production manually (submit the TestFlight
#             build to the App Store; promote the Firebase/Play build).
# ============================================================================
pipelines:
  nightly:
    stages:
      - build: {}

stages:
  build:
    workflows:
      - ios: {}
      - android: {}

app:
  envs:
    - APP_ENV: production
    - BUILD_NUMBER: $BITRISE_BUILD_NUMBER
    # Generated by `expo prebuild` from the production app name "AC2".
    - BITRISE_PROJECT_PATH: ios/AC2.xcworkspace
    - BITRISE_SCHEME: AC2
    # Apple Developer team for the App Store account that owns
    # app.perawallet.ac2-wallet. The Fastfile pins manual signing to this team
    # for both targets. Not secret (team IDs ship in every app).
    - IOS_TEAM_ID: KHH37325LN
    - LANG: en_US.UTF-8
    - LC_ALL: en_US.UTF-8

# ============================================================================
# Platform workflows. Each chains the shared prepare workflow, prebuilds, and
# runs the matching Fastlane lane. iOS signing assets are installed by the
# Bitrise "Manage iOS code signing" step before the Fastlane build.
# ============================================================================
workflows:
  ios:
    meta:
      bitrise.io:
        stack: osx-xcode-26.2.x-edge
        machine_type_id: g2.mac.large
    before_run:
      - _prepare
    after_run:
      - _ios

  android:
    meta:
      bitrise.io:
        stack: linux-docker-android-22.04
    before_run:
      - _prepare
    after_run:
      - _android

  # --------------------------------------------------------------------------
  # Shared utility workflows (prefixed with _ so they are not directly run).
  # --------------------------------------------------------------------------
  _prepare:
    steps:
      - git-clone@8:
          inputs:
            - clone_depth: "0"
            - fetch_tags: "yes"
      - script@1:
          title: Build release notes from git log
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -e
                NOTES=$(git log -10 --pretty=format:'- %s' 2>/dev/null || echo "Build $BUILD_NUMBER")
                envman add --key RELEASE_NOTES --value "$NOTES"
      - restore-cache@3:
          title: Restore node_modules
          inputs:
            - key: node-modules-{{ checksum "pnpm-lock.yaml" }}
      - script@1:
          title: Install Node + JS dependencies (pnpm)
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -ex
                corepack enable
                corepack prepare pnpm@10.12.1 --activate
                pnpm install --frozen-lockfile --prefer-offline
      - save-cache@1:
          title: Save node_modules
          inputs:
            - key: node-modules-{{ checksum "pnpm-lock.yaml" }}
            - paths: |-
                node_modules
                packages/*/node_modules
      - restore-cache@3:
          title: Restore Ruby gems
          inputs:
            - key: bundler-{{ checksum "Gemfile.lock" }}
      - script@1:
          title: Install Ruby gems (fastlane)
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -ex
                # Local path so the gems land in a cacheable dir; persists to
                # the `bundle exec` calls in later steps via .bundle/config.
                bundle config set --local path vendor/bundle
                bundle install
      - save-cache@1:
          title: Save Ruby gems
          inputs:
            - key: bundler-{{ checksum "Gemfile.lock" }}
            - paths: vendor/bundle

  _ios:
    steps:
      - restore-cache@3:
          title: Restore CocoaPods
          inputs:
            - key: |-
                ios-pods-{{ checksum "pnpm-lock.yaml" }}
                ios-pods-
      - script@1:
          title: Expo prebuild (iOS)
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -ex
                pnpm expo prebuild --platform ios --clean
      - save-cache@1:
          title: Save CocoaPods
          inputs:
            - key: ios-pods-{{ checksum "pnpm-lock.yaml" }}
            - paths: ios/Pods
      # Installs the distribution certificate AND every provisioning profile
      # uploaded to this app's "Code Signing & Files" section onto the VM, with
      # no target detection. This is the setup pera-rn uses for the identical
      # app + PasskeyAutofillCredentialProvider layout. We deliberately do NOT
      # use manage-ios-code-signing@2: in api-key mode it ignores the uploaded
      # profiles (creates its own) and can't see the extension target, so it
      # never provisions the autofill extension.
      #
      # PREREQUISITE: the "AC2 Wallet" and "AC2 Wallet Extension" .mobileprovision
      # files must be uploaded to Code Signing & Files (the distribution .p12
      # already is). The Fastfile pins each target to these profiles by name.
      - certificate-and-profile-installer@1:
          title: Install signing cert + provisioning profiles
      - restore-cache@3:
          title: Restore Xcode DerivedData
          inputs:
            - key: |-
                ios-derived-data-{{ checksum "pnpm-lock.yaml" }}
                ios-derived-data-
      - script@1:
          title: Build + upload to TestFlight (fastlane)
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -ex
                # Incremental (clean:false) to reuse the cached DerivedData.
                bundle exec fastlane ios deploy_production clean:false
      - save-cache@1:
          title: Save Xcode DerivedData
          inputs:
            - key: ios-derived-data-{{ checksum "pnpm-lock.yaml" }}
            - paths: ~/Library/Developer/Xcode/DerivedData
      - deploy-to-bitrise-io@2:
          inputs:
            - deploy_path: ./build/ios

  _android:
    steps:
      - set-java-version@1:
          inputs:
            - set_java_version: "17"
      - script@1:
          title: Decode signing keystore + Firebase service account
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -e
                mkdir -p config
                echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > config/release.keystore
                echo "$FIREBASE_SERVICE_ACCOUNT_BASE64" | base64 --decode > config/firebase-service-account.json
                envman add --key ANDROID_KEYSTORE_PATH --value "$BITRISE_SOURCE_DIR/config/release.keystore"
                # Fail fast (seconds, not a 20-min build) with a clear error if
                # the keystore decode / store password / alias are wrong.
                keytool -list -keystore config/release.keystore \
                  -storepass "$ANDROID_KEYSTORE_PASSWORD" -alias "$ANDROID_KEY_ALIAS" >/dev/null \
                  && echo "Keystore OK: alias '$ANDROID_KEY_ALIAS' found"
      - script@1:
          title: Install + configure ccache
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -ex
                sudo apt-get update && sudo apt-get install -y ccache
                ccache --set-config=max_size=2G
                ccache --set-config=compression=true
                # Route the NDK/CMake compilers through ccache so the native
                # C++ deps (webrtc, quick-crypto, mmkv, nitro, reanimated) hit
                # the cache instead of recompiling. envman so it persists to
                # the Gradle step.
                envman add --key NDK_CCACHE --value "$(command -v ccache)"
                envman add --key CMAKE_C_COMPILER_LAUNCHER --value ccache
                envman add --key CMAKE_CXX_COMPILER_LAUNCHER --value ccache
                # Limit parallelism so concurrent Kotlin/KSP/CMake workers don't
                # collectively blow the metaspace cap (OOM). Matches the
                # eas.json testing profile's proven GRADLE_OPTS.
                envman add --key GRADLE_OPTS --value "-Xmx6144m -XX:MaxMetaspaceSize=1g -XX:+UseG1GC -XX:+HeapDumpOnOutOfMemoryError -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false -Dorg.gradle.workers.max=2"
      - restore-cache@3:
          title: Restore ccache
          inputs:
            - key: |-
                android-ccache-{{ checksum "pnpm-lock.yaml" }}
                android-ccache-
      - restore-cache@3:
          title: Restore Gradle caches
          inputs:
            - key: |-
                android-gradle-{{ checksum "pnpm-lock.yaml" }}
                android-gradle-
      - script@1:
          title: Expo prebuild (Android)
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -ex
                pnpm expo prebuild --platform android --clean
      - script@1:
          title: Build APK + upload to Firebase App Distribution
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -ex
                bundle exec fastlane android deploy_production
      - script@1:
          title: ccache stats
          is_always_run: true
          inputs:
            - content: |-
                #!/usr/bin/env bash
                ccache -s || true
      - save-cache@1:
          title: Save Gradle caches
          inputs:
            - key: android-gradle-{{ checksum "pnpm-lock.yaml" }}
            - paths: |-
                ~/.gradle/caches
                ~/.gradle/wrapper
      - save-cache@1:
          title: Save ccache
          inputs:
            - key: android-ccache-{{ checksum "pnpm-lock.yaml" }}
            - paths: ~/.ccache
      - deploy-to-bitrise-io@2:
          inputs:
            - deploy_path: android/app/build/outputs/apk/release
